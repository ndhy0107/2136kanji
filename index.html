<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Kanji - 2 chữ mỗi dòng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        /* Button styles */
        .button-container {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .random-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .random-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .random-btn:active {
            transform: translateY(0);
        }
        
        /* Grid hiển thị 2 chữ mỗi dòng */
        .kanji-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);  /* Chính xác 2 cột */
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .kanji-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .kanji-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-color: #667eea;
            background: white;
        }
        
        .kanji-char {
            font-size: 64px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        
        .kanji-reading {
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .kanji-meaning {
            font-size: 16px;
            color: #666;
            line-height: 1.4;
        }
        
        /* Stats */
        .stats {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .stats p {
            color: #666;
            font-size: 14px;
        }
        
        /* Modal popup cho ảnh */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            animation: fadeIn 0.3s;
        }
        
        .modal-content {
            position: relative;
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            border-radius: 15px;
            text-align: center;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .close {
            position: absolute;
            right: 20px;
            top: 10px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .close:hover {
            color: #333;
        }
        
        .modal-image {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .modal-kanji {
            font-size: 72px;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        
        .modal-reading {
            font-size: 20px;
            color: #667eea;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .modal-meaning {
            font-size: 18px;
            color: #666;
            margin: 10px 0;
        }
        
        .loading {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            color: #dc3545;
            padding: 20px;
            font-size: 16px;
        }
        
        /* Responsive cho mobile */
        @media (max-width: 768px) {
            .kanji-grid {
                grid-template-columns: 1fr;  /* Trên mobile: 1 chữ mỗi dòng */
            }
            
            .kanji-char {
                font-size: 48px;
            }
            
            .modal-content {
                width: 95%;
                margin: 10% auto;
            }
        }
        
        /* Responsive cho tablet */
        @media (min-width: 769px) and (max-width: 1024px) {
            .kanji-grid {
                grid-template-columns: repeat(2, 1fr);  /* Giữ 2 cột */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Học Kanji mỗi ngày</h1>
        <p class="subtitle">✨ Click vào chữ Hán để xem hình ảnh minh họa</p>
        
        <div class="button-container">
            <button class="random-btn" onclick="loadRandomKanji()">🎲 Random 2 chữ mới</button>
        </div>
        
        <div class="kanji-grid" id="kanjiGrid"></div>
        
        <div class="stats">
            <p>📊 Tổng số chữ Hán: <span id="totalCount">0</span> | 
            🔄 Mỗi lần random hiển thị <strong>2 chữ</strong> (2 chữ mỗi dòng)</p>
        </div>
    </div>
    
    <!-- Modal popup -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalContent">
                <div class="modal-kanji" id="modalKanji"></div>
                <div class="modal-reading" id="modalReading"></div>
                <div class="modal-meaning" id="modalMeaning"></div>
                <div id="modalImageContainer">
                    <div class="loading"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="data.js"></script>
    <script>
        // Cấu hình GitHub repo của bạn
        const GITHUB_REPO = "https://raw.githubusercontent.com/ndhy0107/2136kanji/main";
        const IMAGE_FOLDER = "/images";
        
        // Cache ảnh để tránh tải lại nhiều lần
        const imageCache = new Map();
        
        // Số lượng chữ hiển thị mỗi lần (2 chữ)
        const DISPLAY_COUNT = 2;
        
        // Cập nhật tổng số chữ
        document.getElementById("totalCount").textContent = vocabulary.length;
        
        // Hàm lấy ngẫu nhiên n phần tử từ mảng
        function getRandomItems(arr, count) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, count);
        }
        
        // Hiển thị 2 chữ random
        function loadRandomKanji() {
            const randomItems = getRandomItems(vocabulary, DISPLAY_COUNT);
            displayKanjiList(randomItems);
        }
        
        // Hiển thị danh sách các chữ được chọn
        function displayKanjiList(kanjiList) {
            const grid = document.getElementById("kanjiGrid");
            grid.innerHTML = "";
            
            kanjiList.forEach(item => {
                const card = document.createElement("div");
                card.className = "kanji-card";
                card.onclick = () => showImage(item.kanji);
                card.innerHTML = `
                    <div class="kanji-char">${item.kanji}</div>
                    <div class="kanji-reading">${item.meaning || ''}</div>
                    <div class="kanji-meaning">${item.vietnamese || ''}</div>
                `;
                grid.appendChild(card);
            });
        }
        
        // Hiển thị ảnh trong modal
        async function showImage(kanji) {
            const modal = document.getElementById("imageModal");
            const modalKanji = document.getElementById("modalKanji");
            const modalReading = document.getElementById("modalReading");
            const modalMeaning = document.getElementById("modalMeaning");
            const modalImageContainer = document.getElementById("modalImageContainer");
            
            // Tìm từ trong vocabulary để lấy thông tin
            const wordData = vocabulary.find(item => item.kanji === kanji);
            
            modalKanji.textContent = kanji;
            if (wordData) {
                modalReading.textContent = wordData.meaning || "";
                modalMeaning.textContent = wordData.vietnamese || "";
            }
            
            modalImageContainer.innerHTML = '<div class="loading"></div>';
            modal.style.display = "block";
            
            // Tìm file ảnh
            const extensions = ['.jpg', '.png', '.jpeg', '.gif'];
            let imageUrl = null;
            
            for (const ext of extensions) {
                const url = `${GITHUB_REPO}${IMAGE_FOLDER}/${encodeURIComponent(kanji)}${ext}`;
                
                if (imageCache.has(url)) {
                    imageUrl = url;
                    break;
                }
                
                try {
                    const response = await fetch(url, { method: 'HEAD' });
                    if (response.ok) {
                        imageUrl = url;
                        imageCache.set(url, true);
                        break;
                    }
                } catch (error) {
                    console.log(`Không tìm thấy: ${kanji}${ext}`);
                }
            }
            
            if (imageUrl) {
                const img = document.createElement("img");
                img.src = imageUrl;
                img.className = "modal-image";
                img.alt = kanji;
                img.onload = () => {
                    modalImageContainer.innerHTML = "";
                    modalImageContainer.appendChild(img);
                };
                img.onerror = () => {
                    modalImageContainer.innerHTML = '<div class="error-message">❌ Không thể tải ảnh</div>';
                };
            } else {
                modalImageContainer.innerHTML = `
                    <div class="error-message">
                        ❌ Không tìm thấy ảnh cho chữ "${kanji}"<br>
                        <small>Hãy đảm bảo file ảnh có tên "${kanji}.jpg" trong thư mục images</small>
                    </div>
                `;
            }
        }
        
        // Đóng modal
        document.querySelector(".close").onclick = function() {
            document.getElementById("imageModal").style.display = "none";
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById("imageModal");
            if (event.target === modal) {
                modal.style.display = "none";
            }
        }
        
        // Thêm keyboard support (ESC để đóng modal)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById("imageModal").style.display = "none";
            }
        });
        
        // Khởi tạo: load 2 chữ random khi trang được tải
        window.addEventListener('DOMContentLoaded', () => {
            loadRandomKanji();
        });
    </script>
</body>
</html>
